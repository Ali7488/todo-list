<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo-List App</title>
  </head>
  <body>
    <!--Side Dashboard HTML-->
    <div id="dashboard">
      <div class="dashboardLogo">
        <img alt="TaskDock logo" class="logo" />
        <h1 class="websiteHeader">TaskDock</h1>
      </div>
      <button type="button" id="addNewGroupBtn">
        <img alt="" class="btnLogo" aria-hidden="true" />
        Add New Group
      </button>

      <!--This is where the groups will be added to-->
      <ul id="groupsManager"></ul>

      <footer>
        <p>
          Built by
          <a
            class="footerLink"
            href="https://github.com/Ali7488"
            target="_blank"
            >Mohannad Ali</a
          >
        </p>
      </footer>
    </div>

    <!--Task HTML-->
    <main id="mainChecklist"></main>

    <!--*DIALOGS*-->
    <!-- Add Group Dialog -->
    <dialog id="addGroupDialog" class="appDialog">
      <form id="addGroupForm" class="dialogCard">
        <div class="dialogHeader">
          <h2>Add New Group</h2>
          <p>Create a task group like School, Work, or Groceries.</p>
        </div>

        <div class="formField">
          <label for="groupTitleInput"
            >Group title <span style="color: rgb(163, 24, 24)">*</span></label
          >
          <input
            type="text"
            id="groupTitleInput"
            name="groupTitle"
            placeholder="School"
            required
          />
        </div>

        <div class="formField">
          <label for="groupDescInput">Description</label>
          <textarea
            id="groupDescInput"
            name="groupDesc"
            rows="3"
            placeholder="Assignments, exams, and course work"
          ></textarea>
        </div>
        <p>* indicates required fields</p>
        <div class="dialogActions">
          <button
            type="button"
            class="dialogBtn secondaryBtn"
            data-action="close-dialog"
          >
            Cancel
          </button>

          <button type="submit" class="dialogBtn primaryBtn">
            Create Group
          </button>
        </div>
      </form>
    </dialog>

    <!-- Add Task Dialog -->
    <dialog id="addTaskDialog" class="appDialog">
      <form id="addTaskForm" class="dialogCard">
        <div class="dialogHeader">
          <h2>Add New Task</h2>
          <p>Add a task to the currently selected group.</p>
        </div>

        <div class="formField">
          <label for="taskNameInput">Task name</label>
          <input
            type="text"
            id="taskNameInput"
            name="taskName"
            placeholder="Finish CSS layout"
            required
          />
        </div>

        <div class="formField">
          <label for="taskPriorityInput">Priority</label>
          <select id="taskPriorityInput" name="taskPriority" required>
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="formField">
          <label for="taskDueDateInput">Due date</label>
          <input type="date" id="taskDueDateInput" name="taskDueDate" />
        </div>

        <div class="dialogActions">
          <button
            type="button"
            class="dialogBtn secondaryBtn"
            data-action="close-dialog"
          >
            Cancel
          </button>

          <button type="submit" class="dialogBtn primaryBtn">Add Task</button>
        </div>
      </form>
    </dialog>

    <!--*TEMPLATES*-->
    <!--Template for when there is no tasks-->
    <template id="emptyStateTemplate">
      <p class="nothingSelected">
        You have not selected any groups yet <br />
        select a task or create a new one to begin
      </p>
    </template>

    <!-- Template for groups in the sidebar-->
    <template id="groupItemTemplate">
      <li class="groupItem">
        <button type="button" class="groupCard" data-group-id="">
          <span class="groupCardName"></span>
          <span class="groupCardCount"></span>
        </button>
        <button
          type="button"
          class="groupDeleteBtn"
          data-action="delete-group"
          aria-label="Delete Group"
        >
          x
        </button>
      </li>
    </template>

    <template id="taskRowTemplate">
      <li class="taskRow" data-task-id="">
        <label class="taskLeft">
          <input
            type="checkbox"
            class="taskCheckbox"
            data-action="toggle-task"
          />
          <span class="taskName"></span>
        </label>

        <div class="taskRight">
          <span class="priorityBadge"></span>
          <time class="dueDate"></time>

          <button
            type="button"
            class="taskDeleteBtn"
            data-action="delete-task"
            aria-label="Delete task"
          >
            x
          </button>
        </div>
      </li>
    </template>

    <template id="selectedGroupTemplate">
      <div class="selectedGroupHeader">
        <div class="textSegment">
          <h1 class="groupTitle"></h1>
          <p class="groupSubtitle"></p>
        </div>

        <button type="button" class="addNewTaskBtn" data-action="add-task">
          <img alt="" class="btnLogo" aria-hidden="true" />
          Add New Task
        </button>
      </div>

      <!--This is where the individual classes will be added-->
      <ul class="taskChecklist"></ul>
    </template>
  </body>
</html>
